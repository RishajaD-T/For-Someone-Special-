<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Lora', Georgia, serif;
  background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 50%, #d4667a 100%);
  overflow-x: hidden;
  overflow-y: auto;
  padding: 20px;
}

/* ───────── Card ───────── */

.card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  padding: 44px 40px 40px;
  border-radius: 24px;

  text-align: center;

  box-shadow:
    0 8px 40px rgba(180,60,80,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.35);

  animation: fadeIn 1.4s cubic-bezier(.22,1,.36,1) both;

  width: 88%;
  max-width: 620px;
  margin: 30px 0;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.3rem, 5vw, 1.75rem);
  color: white;
  text-shadow: 0 2px 12px rgba(180,60,80,0.35);
  margin: 0 0 8px;
}

.subtitle {
  color: rgba(255,255,255,0.85);
  font-size: 0.95rem;
  margin: 0 0 24px;
  font-style: italic;
}

/* ───────── Button ───────── */

.btn {
  display: inline-block;
  padding: 13px 32px;
  border: none;
  border-radius: 50px;

  background: white;
  color: #d4667a;

  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;

  cursor: pointer;

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    opacity .25s ease;

  box-shadow: 0 4px 18px rgba(180,60,80,0.2);
}

.btn:hover:not(:disabled) {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(255,255,255,0.5);
}

.btn:disabled {
  opacity: 0.55;
  cursor: default;
}

/* ───────── Poem ───────── */

#poemBox {
  display: none;
  margin-top: 28px;

  text-align: left;
  color: white;

  font-size: 18px;
  line-height: 2;

  white-space: pre-line;

  border-top: 1px solid rgba(255,255,255,0.3);
  padding-top: 22px;
}

#poemBox.show {
  animation: poemFade 1.2s ease forwards;
}

#poemBox.typing::after {
  content: "|";
  animation: blink 0.7s step-end infinite;
  color: rgba(255,255,255,0.85);
}

@keyframes poemFade {
  from {
    opacity: 0;
    transform: translateY(25px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ───────── Card Fade ───────── */

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(24px) scale(.92);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ───────── Floating Hearts ───────── */

.heart {
  position: fixed;
  bottom: -60px;
  font-size: 1.4rem;
  pointer-events: none;
  animation: floatUp linear infinite;
  will-change: transform, opacity;
  z-index: 1;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) rotate(0deg) scale(.6);
    opacity: 0;
  }

  10% {
    opacity: .7;
  }

  80% {
    opacity: .5;
  }

  100% {
    transform: translateY(-110vh) rotate(25deg) scale(1.1);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card">

  <h1>For Ms Fihmieda Asruf 🌹</h1>

  <p class="subtitle">
    Something I wanted you to read…
  </p>

  <button class="btn" id="revealBtn" onclick="showPoem()">
    Click me 💖
  </button>

  <div id="poemBox"></div>

</div>

<script>

/* ───────── Floating Hearts ───────── */

const HEART_COUNT = 28;

const emojis = [
  '❤️',
  '🩷',
  '💗',
  '💖',
  '💕'
];

for (let i = 0; i < HEART_COUNT; i++) {

  const h = document.createElement('span');

  h.className = 'heart';

  h.textContent =
    emojis[Math.floor(Math.random() * emojis.length)];

  const duration = 6 + Math.random() * 7;
  const delay = -(Math.random() * duration);
  const leftPos = Math.random() * 98;
  const size = 0.9 + Math.random() * 0.9;

  h.style.cssText = `
    left:${leftPos}vw;
    font-size:${size}rem;
    animation-duration:${duration}s;
    animation-delay:${delay}s;
  `;

  document.body.appendChild(h);
}

/* ───────── Poem ───────── */

const poem =

`My beloved teacher
If I ever have to bow for you, then I'll do it with a smile. Not because I have to, but you mean that much. Because you deserve a place above my pride and my ego. Because caring for you is not being above you, it's about appreciating you, respecting you, and being grateful you exist. And if the sun can do that, then I can put my pride aside for someone who makes my days brighter. Even the rising sun sets for the moon.`;

/* ───────── Typewriter ───────── */

let typeTimer = null;

function typeWriter(text, el, speed = 22) {

  let index = 0;

  el.textContent = '';

  el.classList.add('typing');

  if (typeTimer) {
    clearTimeout(typeTimer);
  }

  function next() {

    if (index < text.length) {

      el.textContent += text[index];

      index++;

      typeTimer = setTimeout(next, speed);

    } else {

      el.classList.remove('typing');

      typeTimer = null;
    }
  }

  next();
}

/* ───────── Button ───────── */

function showPoem() {

  const btn =
    document.getElementById('revealBtn');

  const box =
    document.getElementById('poemBox');

  btn.disabled = true;

  btn.textContent = '💌 Reading…';

  box.style.display = 'block';

  box.classList.add('show');

  typeWriter(poem, box, 22);
}

</script>

</body>
</html>
